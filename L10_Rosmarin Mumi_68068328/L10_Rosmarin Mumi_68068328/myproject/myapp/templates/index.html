{% extends 'base.html' %}

{% block content %}
<div class="container mt-4 mb-5">
    <h2 style="color: blueviolet;">ยินดีต้อนรับเข้าสู่ประชากร</h2>

    <table class="table table-hover">
        <thead>
            <tr>
                <th scope="col">ลำดับ</th>
                <th scope="col">ชื่อประชากร</th>
                <th scope="col">อายุ</th>
                <th scope="col">แก้ไข</th>
                <th scope="col">ลบ</th>
            </tr>
        </thead>
        <tbody>
            {% for person in all_person %}
            <tr>
               <td>{{ forloop.counter }}</td>
                <td>{{ person.name }}</td>
                <td>{{ person.age }}</td>
                
                <td class="text-center"><a href="#" class="btn" style="background-color:#FF69B4; color:white;">แก้ไข</a></td>

                 <td class="text-center"><a href="#" class="btn" style="background-color:#FF8C00; color:white;">ลบ</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
